<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Handiplage &mdash; Mon espace</title>
  <link rel="icon" type="image/png" href="logo%20handiplage%20antibes.png">
  <link rel="stylesheet" href="css/usager.css">
</head>
<body>

<header id="usager-header">
  <div class="usager-logo">
    <img src="logo%20handiplage%20antibes%20alexis.svg" alt="" class="usager-logo-img">
    Handiplage
  </div>
  <button id="btn-logout-usager">D&eacute;connexion</button>
</header>

<div class="usager-shell">

  <aside class="usager-sidebar">
    <div class="usager-sidebar-inner">
      <p class="usager-sidebar-tagline">Votre espace plage accessible à Antibes</p>
      <hr class="usager-sidebar-hr">
      <div class="usager-sidebar-infos">
        <div class="usager-sidebar-info">
          <div class="usager-sidebar-info-icon"><img src="icone%20lieu.svg" alt=""></div>
          <span>Bd James Wyllie, Antibes</span>
        </div>
        <div class="usager-sidebar-info">
          <div class="usager-sidebar-info-icon"><img src="icone%20horaire.svg" alt=""></div>
          <span>8h30 – 18h15 · 5 créneaux</span>
        </div>
        <div class="usager-sidebar-info">
          <div class="usager-sidebar-info-icon"><img src="icone%20r%C3%A9server.svg" alt=""></div>
          <span>12 juin – 15 sept. 2026</span>
        </div>
      </div>
    </div>
    <!-- Zone photo : affecter background-image: url(...) sur .usager-sidebar-photo quand la photo est disponible -->
    <div class="usager-sidebar-photo">
      <svg class="usager-sidebar-waves" viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0,20 C50,0 100,40 150,20 C200,0 250,40 300,20 L300,60 L0,60 Z" fill="rgba(255,255,255,0.07)"/>
        <path d="M0,34 C60,14 120,50 180,32 C230,16 270,46 300,34 L300,60 L0,60 Z" fill="rgba(255,255,255,0.05)"/>
        <path d="M0,46 C70,30 140,60 210,44 C250,34 280,54 300,46 L300,60 L0,60 Z" fill="rgba(255,255,255,0.04)"/>
      </svg>
    </div>
  </aside>

  <main id="usager-content">
    <!-- Inject&eacute; par usager-app.js -->
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/env.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/slots.js"></script>
<script src="js/usager-storage.js"></script>
<script src="js/usager-accueil.js"></script>
<script src="js/usager-reserver.js"></script>
<script src="js/usager-reservations.js"></script>
<script src="js/usager-compte.js"></script>
<script src="js/usager-infos.js"></script>
<script src="js/usager-contact.js"></script>
<script src="js/usager-app.js"></script>
<footer class="site-footer">
  <div class="site-footer-inner">
    <span>© 2026 CCAS d'Antibes — Handiplage</span>
    <a href="mentions-legales.html">Mentions légales</a>
    <a href="politique-confidentialite.html">Politique de confidentialité</a>
  </div>
</footer>

<script>
  (async function () {
    try {
      var session = await getSession();
      if (!session || getUserRole(session) !== 'user') {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('btn-logout-usager').addEventListener('click', signOut);
      UsagerApp.init();
    } catch (err) {
      console.error('Auth check failed:', err);
      window.location.href = 'login.html';
    }
  })();
</script>
</body>
</html>
