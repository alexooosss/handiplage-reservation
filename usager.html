<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Handiplage &mdash; Mon espace</title>
  <link rel="icon" type="image/png" href="logo%20handiplage%20antibes.png">
  <link rel="stylesheet" href="css/usager.css">
</head>
<body>

<header id="usager-header">
  <div class="usager-logo">&#127958; Handiplage</div>
  <button id="btn-logout-usager">D&eacute;connexion</button>
</header>

<main id="usager-content">
  <!-- Inject&eacute; par usager-app.js -->
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/env.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/usager-storage.js"></script>
<script src="js/usager-accueil.js"></script>
<script src="js/usager-reserver.js"></script>
<script src="js/usager-reservations.js"></script>
<script src="js/usager-compte.js"></script>
<script src="js/usager-infos.js"></script>
<script src="js/usager-contact.js"></script>
<script src="js/usager-app.js"></script>
<script>
  (async function () {
    try {
      var session = await getSession();
      if (!session || getUserRole(session) !== 'user') {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('btn-logout-usager').addEventListener('click', signOut);
      UsagerApp.init();
    } catch (err) {
      console.error('Auth check failed:', err);
      window.location.href = 'login.html';
    }
  })();
</script>
</body>
</html>
