<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Capturer le hash avant que Supabase ne le consomme -->
  <script>window._initialHash = window.location.hash;</script>
  <link rel="icon" type="image/png" href="logo%20handiplage%20antibes.png">
  <title>Connexion — Handiplage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* ── Panneau gauche ── */
    .login-panel {
      width: 50%;
      min-height: 100vh;
      background: linear-gradient(160deg, #1a2340 0%, #111b33 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 56px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    /* Halos décoratifs subtils */
    .login-panel::before {
      content: '';
      position: absolute;
      bottom: -120px;
      left: -120px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(7,114,184,.09) 0%, transparent 65%);
      pointer-events: none;
    }
    .login-panel::after {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(209,200,37,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-inner {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Bloc identité ── */
    .login-brand-block {
      text-align: center;
      margin-bottom: 24px;
    }

    .login-logo {
      height: 76px;
      width: auto;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 6px 18px rgba(7,114,184,.35));
    }

    .login-brand {
      font-size: 1.875rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.4px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .login-brand-sub {
      font-size: .75rem;
      color: #c9bc24;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── Séparateur ── */
    .login-divider {
      width: 44px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(209,200,37,.6), transparent);
      margin: 20px auto;
    }

    /* ── Formulaire ── */
    .login-title {
      font-size: .9375rem;
      font-weight: 700;
      color: rgba(255,255,255,.85);
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: .01em;
    }

    label {
      display: block;
      font-size: .6875rem;
      color: rgba(255,255,255,.4);
      margin-bottom: 7px;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: .8rem 1rem;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      font-size: .9375rem;
      color: #fff;
      margin-bottom: 18px;
      transition: border-color .18s, background .18s, box-shadow .18s;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder { color: rgba(255,255,255,.2); }

    input:focus {
      outline: none;
      border-color: rgba(7,114,184,.75);
      background: rgba(255,255,255,.08);
      box-shadow: 0 0 0 3px rgba(7,114,184,.18);
    }

    button[type="submit"] {
      width: 100%;
      padding: .875rem;
      background: #0772b8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .12s, box-shadow .15s;
      margin-top: 6px;
      box-shadow: 0 4px 20px rgba(7,114,184,.4);
      letter-spacing: .02em;
    }
    button[type="submit"]:hover {
      background: #0863a2;
      box-shadow: 0 6px 24px rgba(7,114,184,.5);
      transform: translateY(-1px);
    }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled {
      background: rgba(255,255,255,.15);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    #error-msg   { color: #ef9a9a; font-size: .8125rem; margin-top: 14px; min-height: 1.2em; line-height: 1.5; text-align: center; }
    #success-msg { color: #a5d6a7; font-size: .8125rem; margin-top: 14px; min-height: 1.2em; line-height: 1.5; text-align: center; }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: .8125rem;
      color: rgba(255,255,255,.35);
      background: none;
      border: none;
      cursor: pointer;
      transition: color .15s;
    }
    .forgot-link:hover { color: rgba(255,255,255,.7); }

    .login-signup-sep {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 16px;
    }
    .login-signup-sep::before, .login-signup-sep::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.1);
    }
    .login-signup-sep span {
      font-size: .6875rem; color: rgba(255,255,255,.25);
      letter-spacing: .08em; text-transform: uppercase; white-space: nowrap;
    }
    .login-signup-link {
      display: block; text-align: center;
      font-size: .875rem; font-weight: 600;
      color: rgba(255,255,255,.5); text-decoration: none;
      transition: color .15s;
    }
    .login-signup-link:hover { color: #c9bc24; }

    .login-footer {
      margin-top: auto;
      padding-top: 40px;
      font-size: .6875rem;
      color: rgba(255,255,255,.25);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 16px;
    }
    .login-footer a { color: rgba(255,255,255,.32); text-decoration: none; }
    .login-footer a:hover { color: rgba(255,255,255,.6); }

    /* ── Panneau droit (photo) ── */
    .login-photo {
      flex: 1;
      background: url('handiplage.jpg') center / cover no-repeat;
      position: relative;
    }
    .login-photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(12,20,34,.25) 0%, transparent 25%);
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      .login-photo { display: none; }
      .login-panel { width: 100%; padding: 44px 28px; }
      .login-inner { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-panel">
    <div class="login-inner">

      <div class="login-brand-block">
        <img src="logo-handiplage.svg" alt="Handiplage" class="login-logo">
        <div class="login-brand">Handiplage</div>
        <div class="login-brand-sub">Antibes Juan-les-Pins</div>
      </div>

      <div class="login-divider"></div>

      <div class="login-title">Connexion à votre espace</div>

      <form id="login-form" novalidate>
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="votre@email.fr" required />

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />

        <button type="submit" id="submit-btn">Se connecter</button>
      </form>

      <p id="error-msg" role="alert" aria-live="polite"></p>
      <p id="success-msg" aria-live="polite"></p>

      <button class="forgot-link" id="forgot-btn" type="button">Mot de passe oublié ?</button>

      <div class="login-signup-sep"><span>Pas encore inscrit ?</span></div>
      <a href="inscription-publique.html" class="login-signup-link">S'inscrire à la Handiplage d'Antibes →</a>

      <!-- Formulaire création mot de passe (visible après invitation) -->
      <form id="set-password-form" style="display:none" novalidate>
        <p style="font-size:.875rem;color:rgba(255,255,255,.55);margin-bottom:1.25rem;line-height:1.6;text-align:center">
          Bienvenue sur votre espace Handiplage.<br>Choisissez un mot de passe pour accéder à votre compte.
        </p>
        <label for="new-password">Nouveau mot de passe</label>
        <input type="password" id="new-password" name="new-password" autocomplete="new-password"
          placeholder="8 caractères minimum" required />
        <label for="new-password2">Confirmer le mot de passe</label>
        <input type="password" id="new-password2" name="new-password2" autocomplete="new-password"
          placeholder="Répétez le mot de passe" required />
        <button type="submit" id="set-pwd-btn">Créer mon mot de passe</button>
      </form>

      <div class="login-footer">
        <span>© 2026 CCAS d'Antibes</span>
        <a href="mentions-legales.html">Mentions légales</a>
        <a href="politique-confidentialite.html">Confidentialité</a>
      </div>
    </div>
  </div>

  <div class="login-photo"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/env.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      // Détecter le flux invitation — utiliser le hash capturé avant l'init Supabase
      const urlHash = window._initialHash || '';
      const isInvite = urlHash.includes('type=invite') || urlHash.includes('type=recovery');

      // Redirect if already logged in — sauf si c'est un flux invitation
      if (!isInvite) {
        try {
          const session = await getSession();
          if (session) {
            const role = getUserRole(session);
            if (role === 'staff') {
              window.location.href = 'index.html';
              return;
            }
            if (role === 'user') {
              window.location.href = 'usager.html';
              return;
            }
          }
        } catch (e) {
          // Pas de session ou erreur réseau — afficher le formulaire normalement
        }
      }

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const forgotBtn = document.getElementById('forgot-btn');

      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session && isInvite) {
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('forgot-btn').style.display = 'none';
          document.getElementById('set-password-form').style.display = 'block';
          history.replaceState(null, '', window.location.pathname);
        } else if (event === 'SIGNED_IN' && session && !isInvite) {
          const role = getUserRole(session);
          if (role === 'staff') { window.location.href = 'index.html'; }
          else if (role === 'user') { window.location.href = 'usager.html'; }
        }
      });

      const setPasswordForm = document.getElementById('set-password-form');
      const setPwdBtn = document.getElementById('set-pwd-btn');
      setPasswordForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorMsg.textContent = '';
        const pwd  = document.getElementById('new-password').value;
        const pwd2 = document.getElementById('new-password2').value;
        if (pwd.length < 8) { errorMsg.textContent = 'Le mot de passe doit contenir au moins 8 caractères.'; return; }
        if (pwd !== pwd2)   { errorMsg.textContent = 'Les deux mots de passe ne correspondent pas.'; return; }
        setPwdBtn.disabled = true;
        setPwdBtn.textContent = 'Enregistrement…';
        try {
          const { error } = await supabaseClient.auth.updateUser({ password: pwd });
          if (error) throw error;
          window.location.href = 'usager.html';
        } catch (err) {
          errorMsg.textContent = 'Erreur : ' + (err.message || 'Impossible de définir le mot de passe.');
          setPwdBtn.disabled = false;
          setPwdBtn.textContent = 'Créer mon mot de passe';
        }
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorMsg.textContent = '';
        successMsg.textContent = '';

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          errorMsg.textContent = 'Veuillez remplir tous les champs.';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Connexion…';

        try {
          const data = await signIn(email, password);
          const role = getUserRole(data.session);
          if (role === 'staff') {
            window.location.href = 'index.html';
          } else if (role === 'user') {
            window.location.href = 'usager.html';
          } else {
            errorMsg.textContent = 'Rôle inconnu. Contactez l\'administrateur.';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Se connecter';
          }
        } catch (err) {
          const msg = err && err.message ? err.message : 'Erreur de connexion.';
          if (msg.toLowerCase().includes('invalid login credentials') ||
              msg.toLowerCase().includes('invalid credentials')) {
            errorMsg.textContent = 'Identifiants incorrects. Vérifiez votre e-mail et mot de passe.';
          } else if (msg.toLowerCase().includes('email not confirmed')) {
            errorMsg.textContent = 'Votre adresse e-mail n\'a pas encore été confirmée.';
          } else {
            errorMsg.textContent = 'Erreur de connexion : ' + msg;
          }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Se connecter';
        }
      });

      forgotBtn.addEventListener('click', async function () {
        errorMsg.textContent = '';
        successMsg.textContent = '';
        const email = emailInput.value.trim();
        if (!email) {
          errorMsg.textContent = 'Entrez votre adresse e-mail ci-dessus pour réinitialiser le mot de passe.';
          return;
        }
        try {
          await supabaseClient.auth.resetPasswordForEmail(email);
          successMsg.textContent = 'Un e-mail de réinitialisation a été envoyé à ' + email + '. Vérifiez votre boîte de réception.';
        } catch (err) {
          errorMsg.textContent = 'Impossible d\'envoyer l\'e-mail de réinitialisation. Réessayez.';
        }
      });
    })();
  </script>

</body>
</html>
