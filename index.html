<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Interface staff — responsive tablette (≥768px) -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Handiplage - Staff</title>
  <link rel="icon" type="image/png" href="logo%20handiplage%20antibes.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header id="app-header">
    <div class="logo">
      <img src="logo-handiplage.svg" alt="Handiplage Antibes" class="logo-img">
    </div>
    <nav class="slots-nav" id="slots-nav">
      <!-- Injecté par app.js -->
    </nav>
    <button id="btn-planning-tab" class="planning-tab-btn">Planning</button>
    <button id="btn-mc-tab" class="planning-tab-btn">Main courante</button>
    <button id="btn-insc-tab" class="planning-tab-btn">Inscription</button>
    <button id="btn-groupes-tab" class="planning-tab-btn">Groupes</button>
    <button id="btn-messages-tab" class="planning-tab-btn">
      Messages<span id="messages-badge" class="msg-badge" style="display:none"></span>
    </button>
    <button id="btn-stats-tab" class="planning-tab-btn">Stats</button>
    <button id="btn-profil-tab" class="planning-tab-btn" style="margin-left:auto" title="Mon profil"><img src="icone%20mon%20compte%20blanc.svg" alt="Mon profil" style="height:20px;width:20px;display:block"></button>
    <button id="btn-logout" class="planning-tab-btn">Déconnexion</button>
    <div class="datetime" id="datetime">
      <span class="time" id="clock">--:--</span>
      <span id="date-label"></span>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- Panneau gauche : carte de plage -->
    <div class="beach-panel" id="beach-panel">
      <div class="beach-road">
        <span class="parking-label">Parking</span>
      </div>
      <div id="selection-banner" class="selection-banner" style="display:none"></div>
      <div class="beach-map-container">
        <div class="beach-map" id="beach-map">
          <!-- Injecté par map.js -->
        </div>
      </div>
      <div class="beach-sea">
        <span class="sea-label">Mer</span>
      </div>
    </div>

    <!-- Panneau droit : gestion créneau -->
    <div class="side-panel" id="side-panel">
      <!-- Injecté par panel.js -->
    </div>

    <!-- Vue Planning -->
    <div id="planning-view" style="display:none" class="planning-view"></div>

    <!-- Vue Main courante -->
    <div id="mc-view" style="display:none" class="mc-view"></div>

    <!-- Vue Inscription -->
    <div id="insc-view" style="display:none" class="insc-view"></div>

    <!-- Vue Groupes -->
    <div id="groupes-view" style="display:none" class="groupes-view"></div>

    <!-- Vue Messages -->
    <div id="messages-view" style="display:none" class="messages-view"></div>

    <!-- Vue Statistiques -->
    <div id="stats-view" style="display:none" class="stats-view"></div>

    <!-- Vue Profil -->
    <div id="profil-view" style="display:none" class="profil-view"></div>

  </div>

  <!-- MODALE -->
  <dialog id="app-modal">
    <!-- Injecté par modal.js -->
  </dialog>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/env.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/slots.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/logo.js"></script>
  <script src="js/supabase-storage.js"></script>
  <script src="js/supabase-inscriptions.js"></script>
  <script src="js/supabase-mc.js"></script>
  <script src="js/map.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/planning.js"></script>
  <script src="js/entretien.js"></script>
  <script src="js/mc.js"></script>
  <script src="js/inscription.js"></script>
  <script src="js/pass.js"></script>
  <script src="js/supabase-groupes.js"></script>
  <script src="js/groupes.js"></script>
  <script src="js/supabase-messages.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/supabase-stats.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/staff-profil.js"></script>
  <script src="js/app.js"></script>
  <script src="js/arcade.js"></script>
  <script>
    (async function () {
      try {
        const session = await getSession();
        if (!session || getUserRole(session) !== 'staff') {
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('btn-logout').addEventListener('click', signOut);
        var mapEl = document.getElementById('beach-map');
        renderMapStatic(mapEl);
        App.init();
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = 'login.html';
      }
    })();
  </script>

<footer class="site-footer">
  <div class="site-footer-inner">
    <span>© 2026 CCAS d'Antibes — Handiplage</span>
    <a href="mentions-legales.html" target="_blank">Mentions légales</a>
    <a href="politique-confidentialite.html" target="_blank">Politique de confidentialité</a>
    <span class="site-footer-credit">Conçu par A.DALMASSO</span>
  </div>
</footer>
</body>
</html>
